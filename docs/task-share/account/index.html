<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="View your UGK Task Marketplace favorites, downloads, and submissions.">
<title data-i18n="title.account">Account | UGK Tasks</title>

<nav class="nav"><div class="shell"><div class="nav-inner">
  <a class="nav-mobile-brand" href="../" aria-label="UGK Task Marketplace"><span>UGK</span><em>Task</em></a>
  <button class="nav-menu-toggle" type="button" data-nav-toggle aria-expanded="false" data-i18n-aria-label="nav.menu" aria-label="Menu"><span></span><span></span><span></span></button>
  <div class="nav-links">
    <a href="../marketplace/" data-i18n="nav.marketplace">Marketplace</a>
    <a href="../upload/" data-i18n="nav.upload">Upload</a>
    <a href="../account/" data-i18n="nav.account">Account</a>
    <a href="../admin/" data-i18n="nav.admin">Admin</a>
    <div class="nav-menu-actions">
      <span data-theme-switcher></span>
      <span data-language-switcher></span>
      <a class="btn btn-primary" href="/api/auth/github" data-auth-link data-i18n="nav.signIn">Sign in</a>
    </div>
  </div>
  <div class="nav-actions">
    <span class="chip" data-user>Guest</span>
    <span data-theme-switcher></span>

  </div>

<main class="shell shell-mid">
  <div class="page-head">
    <div class="kicker" data-i18n="account.kicker">Your account</div>
    <h1 data-i18n="account.title">Account</h1>
    <p class="lede" data-i18n="account.lede">Your favorite tasks, downloads, and submissions.</p>
  </div>
  <section class="account-page" data-account-page><p class="notice" data-i18n="account.loading">Loading account...</p></section>
</main>

<footer class="footer"><div class="shell"><div class="footer-inner">
  <span><span data-i18n="footer.product">Product</span> UGK</span>
  <span><span data-i18n="footer.author">Author</span> bboyUglyk</span>
  <a href="mailto:ug1yk@foxmail.com"><span data-i18n="footer.contact">Contact</span> ug1yk@foxmail.com</a>
</div></div></footer>

<script src="../i18n.js"></script>
<script>
function tr(key,vars){return window.UGKI18N?.t(key,vars)||key}
function esc(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function statusLabel(status){return tr('account.status.'+(status||'pending'))}
function statusChip(status){return '<span class="status-chip" data-status="'+esc(status||'pending')+'">'+esc(statusLabel(status))+'</span>'}
function accountListRows(items,empty){return items.length?items.map(t=>'<div class="account-row"><div><strong>'+esc(t.title||t.name)+'</strong><span>'+esc(t.description||'')+'</span></div><span class="chip">'+esc(t.name||t.status||'task')+'</span></div>').join(''):'<p class="notice">'+empty+'</p>'}
function accountSubmissionRows(items,empty,archived=false){return items.length?items.map(t=>{const id=Number(t.id);const version=t.version?'<span class="chip card-version">'+esc(String(t.version).startsWith('v')?t.version:'v'+t.version)+'</span>':'';const edit=!archived?'<button class="btn btn-secondary btn-compact" type="button" data-edit-submission-detail="'+id+'">'+tr('account.editDetail')+'</button>':'';const action=!archived?'<button class="btn btn-secondary btn-compact" type="button" data-withdraw-submission="'+id+'">'+tr(t.status==='published'?'account.unpublish':'account.withdraw')+'</button>':'';return '<div class="account-row"><div><strong>'+esc(t.title||t.name)+'</strong><span>'+esc(t.description||'')+'</span><small>'+esc(t.name)+' '+esc(t.updated_at||t.created_at||'')+'</small></div><div class="account-row-meta">'+version+statusChip(t.status)+edit+action+'</div></div>'}).join(''):'<p class="notice">'+empty+'</p>'}
function summaryCard(label,value){return '<div class="account-summary-card"><strong>'+Number(value||0)+'</strong><span>'+label+'</span></div>'}
function showToast(message,type='info'){let box=document.querySelector('[data-toast]');if(!box){box=document.createElement('div');box.className='toast';box.dataset.toast='';box.setAttribute('role','status');box.setAttribute('aria-live','polite');document.body.appendChild(box)}box.textContent=message;box.dataset.type=type;box.dataset.show='true';clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>{box.dataset.show='false'},3200)}
function authErrorMessage(data){return data?.error==='GitHub OAuth is not configured'?tr('toast.authMissing'):(data?.error||tr('toast.authFailed'))}
async function startGithubAuth(){try{const r=await fetch('/api/auth/github',{redirect:'manual',headers:{accept:'application/json'}});if(r.type==='opaqueredirect'||(r.status>=300&&r.status<400)){location.href='/api/auth/github';return}const text=await r.text();let data;try{data=JSON.parse(text)}catch{data=null}if(!r.ok){showToast(authErrorMessage(data),'error');return}location.href='/api/auth/github'}catch{showToast(tr('toast.authFailed'),'error')}}
function bindAuthLinks(){document.addEventListener('click',event=>{const link=event.target.closest('a[href="/api/auth/github"]');if(!link)return;event.preventDefault();startGithubAuth()})}
let currentSession={user:null};
async function refreshSession(){try{const r=await fetch('/api/session');const s=await r.json();document.querySelectorAll('[data-user]').forEach(n=>{n.textContent=s.user?('@'+s.user.login):tr('nav.guest')});document.body.dataset.signedIn=s.user?'true':'false';return s}catch{document.querySelectorAll('[data-user]').forEach(n=>{n.textContent=tr('nav.guest')});return{user:null}}}
async function withdrawSubmission(id){if(!confirm(tr('account.withdrawConfirm')))return;try{const r=await fetch('/api/account/submissions/'+encodeURIComponent(id),{method:'DELETE'});if(r.status===401){startGithubAuth();return}if(!r.ok){showToast(tr('account.withdrawFailed'),'error');return}showToast(tr('account.withdrawn'));await refreshAccount(currentSession)}catch{showToast(tr('account.withdrawFailed'),'error')}}
function detailInputsText(items){return Array.isArray(items)?items.map(item=>(item.name||'')+(item.description?' - '+item.description:'')).join('\n'):''}
function parseDetailInputs(text){return String(text||'').split('\n').map(line=>line.trim()).filter(Boolean).map(line=>{const parts=line.split(/\s+-\s+/);return {name:parts.shift().trim(),description:parts.join(' - ').trim()}}).filter(item=>item.name)}
function parseDetailList(text){return String(text||'').split('\n').map(line=>line.trim()).filter(Boolean)}
function detailEditorHTML(){return '<form class="dialog-card detail-editor" data-detail-editor><h2>'+tr('account.detailEditorTitle')+'</h2><div class="detail-editor-grid"><label class="field"><span>'+tr('account.detailTitle')+'</span><input name="title" required maxlength="120"></label><label class="field"><span>'+tr('account.detailDescription')+'</span><input name="description" required maxlength="600"></label><label class="field field-wide"><span>'+tr('account.detailTrigger')+'</span><textarea name="trigger" maxlength="400"></textarea></label><label class="field"><span>'+tr('account.detailInputs')+'</span><textarea name="inputs"></textarea></label><label class="field"><span>'+tr('account.detailArtifacts')+'</span><textarea name="artifacts"></textarea></label><label class="field field-wide"><span>'+tr('account.detailUsage')+'</span><textarea name="usage"></textarea></label></div><div class="dialog-actions"><button class="btn btn-secondary" type="button" data-detail-cancel>'+tr('account.detailCancel')+'</button><button class="btn btn-primary" type="submit" data-detail-save>'+tr('account.detailSave')+'</button></div></form>'}
async function openDetailEditor(id){try{const r=await fetch('/api/account/submissions/'+encodeURIComponent(id)+'/detail');if(r.status===401){startGithubAuth();return}if(!r.ok){showToast(tr('account.detailFailed'),'error');return}const data=await r.json();const dialog=document.createElement('dialog');dialog.className='ugk-dialog task-detail-dialog';dialog.innerHTML=detailEditorHTML();document.body.appendChild(dialog);const form=dialog.querySelector('[data-detail-editor]');form.elements.title.value=data.title||'';form.elements.description.value=data.description||'';form.elements.trigger.value=data.trigger||'';form.elements.inputs.value=detailInputsText(data.inputs);form.elements.artifacts.value=Array.isArray(data.artifacts)?data.artifacts.join('\n'):'';form.elements.usage.value=data.usage||'';dialog.querySelector('[data-detail-cancel]').addEventListener('click',()=>dialog.close());dialog.addEventListener('close',()=>dialog.remove());form.addEventListener('submit',async event=>{event.preventDefault();const save=form.querySelector('[data-detail-save]');save.disabled=true;save.textContent=tr('account.detailSaving');const payload={title:form.elements.title.value,description:form.elements.description.value,trigger:form.elements.trigger.value,inputs:parseDetailInputs(form.elements.inputs.value),artifacts:parseDetailList(form.elements.artifacts.value),usage:form.elements.usage.value};try{const update=await fetch('/api/account/submissions/'+encodeURIComponent(id)+'/detail',{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify(payload)});if(update.status===401){startGithubAuth();return}if(!update.ok){showToast(tr('account.detailFailed'),'error');save.disabled=false;save.textContent=tr('account.detailSave');return}showToast(tr('account.detailSaved'));dialog.close();await refreshAccount(currentSession)}catch{showToast(tr('account.detailFailed'),'error');save.disabled=false;save.textContent=tr('account.detailSave')}});dialog.showModal();form.elements.title.focus()}catch{showToast(tr('account.detailFailed'),'error')}}
async function refreshAccount(session){currentSession=session;const root=document.querySelector('[data-account-page]');if(!root)return;if(!session.user){root.innerHTML='<div class="empty-state"><h2>'+tr('account.signInTitle')+'</h2><p>'+tr('account.signInText')+'</p><a class="btn btn-primary" href="/api/auth/github">'+tr('account.signInAction')+'</a></div>';return}const [fav,subs,downs]=await Promise.all([fetch('/api/account/favorites'),fetch('/api/account/submissions'),fetch('/api/account/downloads')]);if(!fav.ok||!subs.ok||!downs.ok){root.innerHTML='<p class="notice">'+tr('account.unavailable')+'</p>';return}const f=await fav.json();const s=await subs.json();const d=await downs.json();const submissions=s.submissions||[];const archived=submissions.filter(t=>['withdrawn','rejected'].includes(t.status));const active=submissions.filter(t=>!['withdrawn','rejected'].includes(t.status));root.innerHTML='<div class="account-dashboard"><div class="account-title-row"><h2>@'+esc(session.user.login)+'</h2><a class="btn btn-primary" href="../upload/">'+tr('account.newSubmission')+'</a></div><div class="account-summary" data-account-summary>'+summaryCard(tr('account.totalSubmissions'),submissions.length)+summaryCard(tr('account.activeSubmissions'),active.length)+summaryCard(tr('account.favorites'),(f.favorites||[]).length)+summaryCard(tr('account.downloads'),(d.downloads||[]).length)+'</div><div class="account-grid"><section class="account-list account-list-main"><h3>'+tr('account.activeSubmissions')+'</h3>'+accountSubmissionRows(active,tr('account.noSubmissions'))+'</section><section class="account-list"><h3>'+tr('account.favorites')+'</h3>'+accountListRows(f.favorites||[],tr('account.noFavorites'))+'</section><section class="account-list"><h3>'+tr('account.downloads')+'</h3>'+accountListRows(d.downloads||[],tr('account.noDownloads'))+'</section><section class="account-list account-list-wide"><h3>'+tr('account.archivedSubmissions')+'</h3><p>'+tr('account.archiveHint')+'</p>'+accountSubmissionRows(archived,tr('account.noArchivedSubmissions'),true)+'</section></div></div>'}
bindAuthLinks();
document.addEventListener('click',event=>{const button=event.target.closest('[data-withdraw-submission]');if(!button)return;withdrawSubmission(button.dataset.withdrawSubmission)});
document.addEventListener('click',event=>{const button=event.target.closest('[data-edit-submission-detail]');if(!button)return;openDetailEditor(button.dataset.editSubmissionDetail)});
refreshSession().then(refreshAccount);
window.addEventListener('ugk:i18n',()=>refreshSession().then(refreshAccount));
</script>
</body>
</html>
