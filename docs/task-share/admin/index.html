<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Review UGK Task Marketplace submissions and reports.">
<title data-i18n="title.admin">Admin | UGK Tasks</title>

<link rel="stylesheet" href="../styles.css">
</head>

<nav class="nav"><div class="shell"><div class="nav-inner">
  <a class="nav-mobile-brand" href="../" aria-label="UGK Task Marketplace"><span>UGK</span><em>Task</em></a>
  <button class="nav-menu-toggle" type="button" data-nav-toggle aria-expanded="false" data-i18n-aria-label="nav.menu" aria-label="Menu"><span></span><span></span><span></span></button>
  <div class="nav-links">
    <a href="../marketplace/" data-i18n="nav.marketplace">Marketplace</a>
    <a href="../upload/" data-i18n="nav.upload">Upload</a>
    <a href="../account/" data-i18n="nav.account">Account</a>
    <a href="../admin/" data-i18n="nav.admin">Admin</a>
    <div class="nav-menu-actions">
      <span data-theme-switcher></span>

    </div>
  </div>
  <div class="nav-actions">
    <span class="chip" data-user>Guest</span>
    <span data-theme-switcher></span>

  </div>
</div></div></nav>

<main class="shell shell-mid">
  <div class="page-head">
    <div class="kicker" data-i18n="admin.kicker">Review queue</div>
    <h1 data-i18n="admin.title">Admin</h1>
    <p class="lede" data-i18n="admin.lede">Review pending community submissions and reports.</p>
  </div>
  <section class="panel" data-admin-page><p class="notice" data-i18n="admin.loading">Loading review queue...</p></section>
</main>

<footer class="footer"><div class="shell"><div class="footer-inner">
  <span><span data-i18n="footer.product">Product</span> UGK</span>
  <span><span data-i18n="footer.author">Author</span> bboyUglyk</span>
  <a href="mailto:ug1yk@foxmail.com"><span data-i18n="footer.contact">Contact</span> ug1yk@foxmail.com</a>
</div></div></footer>

<script src="../i18n.js"></script>
<script>
function tr(key,vars){return window.UGKI18N?.t(key,vars)||key}
function esc(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function showToast(message,type='info'){let box=document.querySelector('[data-toast]');if(!box){box=document.createElement('div');box.className='toast';box.dataset.toast='';box.setAttribute('role','status');box.setAttribute('aria-live','polite');document.body.appendChild(box)}box.textContent=message;box.dataset.type=type;box.dataset.show='true';clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>{box.dataset.show='false'},3200)}
function authErrorMessage(data){return data?.error==='GitHub OAuth is not configured'?tr('toast.authMissing'):(data?.error||tr('toast.authFailed'))}
async function startGithubAuth(){try{const r=await fetch('/api/auth/github',{redirect:'manual',headers:{accept:'application/json'}});if(r.type==='opaqueredirect'||(r.status>=300&&r.status<400)){location.href='/api/auth/github';return}const text=await r.text();let data;try{data=JSON.parse(text)}catch{data=null}if(!r.ok){showToast(authErrorMessage(data),'error');return}location.href='/api/auth/github'}catch{showToast(tr('toast.authFailed'),'error')}}
function bindAuthLinks(){document.addEventListener('click',event=>{const link=event.target.closest('a[href="/api/auth/github"]');if(!link)return;event.preventDefault();startGithubAuth()})}
function askReviewConfirm(){return new Promise(resolve=>{let dialog=document.querySelector('[data-confirm-dialog]');if(!dialog){dialog=document.createElement('dialog');dialog.className='ugk-dialog';dialog.dataset.confirmDialog='';dialog.innerHTML='<form class="dialog-card"><h2 data-confirm-title></h2><p data-confirm-text></p><div class="dialog-actions"><button class="btn btn-secondary" type="button" data-confirm-cancel></button><button class="btn btn-primary" type="button" data-confirm-ok></button></div></form>';document.body.appendChild(dialog);dialog.querySelector('[data-confirm-cancel]').addEventListener('click',()=>dialog.close('cancel'));dialog.querySelector('[data-confirm-ok]').addEventListener('click',()=>dialog.close('ok'))}dialog.querySelector('[data-confirm-title]').textContent=tr('admin.rejectTitle');dialog.querySelector('[data-confirm-text]').textContent=tr('admin.rejectText');dialog.querySelector('[data-confirm-cancel]').textContent=tr('report.cancel');dialog.querySelector('[data-confirm-ok]').textContent=tr('admin.reject');dialog.addEventListener('close',function onClose(){dialog.removeEventListener('close',onClose);resolve(dialog.returnValue==='ok')});dialog.showModal()})}
async function refreshSession(){try{const r=await fetch('/api/session');const s=await r.json();document.querySelectorAll('[data-user]').forEach(n=>{n.textContent=s.user?('@'+s.user.login):tr('nav.guest')});document.body.dataset.signedIn=s.user?'true':'false';return s}catch{document.querySelectorAll('[data-user]').forEach(n=>{n.textContent=tr('nav.guest')});return{user:null}}}
function renderAdminSignIn(){const root=document.querySelector('[data-admin-page]');if(!root)return;root.innerHTML='<div class="empty-state"><h2>'+tr('admin.signInTitle')+'</h2><p>'+tr('admin.signInText')+'</p><a class="btn btn-primary" href="/api/auth/github">'+tr('admin.signInAction')+'</a></div>'}
async function refreshAdmin(){const root=document.querySelector('[data-admin-page]');if(!root)return;const [queue,reports]=await Promise.all([fetch('/api/admin/submissions'),fetch('/api/admin/reports')]);if(queue.status===401||reports.status===401){renderAdminSignIn();return}if(queue.status===403||reports.status===403){root.innerHTML='<p class="notice">'+tr('admin.notAdmin')+'</p>';return}if(!queue.ok||!reports.ok){root.innerHTML='<p class="notice">'+tr('admin.unavailable')+'</p>';return}const data=await queue.json();const reportData=await reports.json();const items=data.submissions||[];const reportRows=(reportData.reports||[]).map(r=>'<div class="submission-row"><strong>'+esc(r.task_name)+'</strong><span>@'+esc(r.reporter_login||'user')+'</span><p>'+esc(r.reason)+'</p></div>').join('')||'<p class="notice">'+tr('admin.noReports')+'</p>';root.innerHTML='<h2>'+tr('admin.submissions')+'</h2>'+(items.length?items.map(t=>'<div class="submission-row"><strong>'+esc(t.title)+'</strong><span>'+esc(t.name)+' '+(t.version?'<span class="chip card-version">'+esc(String(t.version).startsWith('v')?t.version:'v'+t.version)+'</span> ':'')+'by @'+esc(t.author_login||'user')+'</span><p>'+esc(t.description)+'</p><div class="submission-actions"><button class="btn btn-primary" data-review-id="'+t.id+'" data-review-status="published">'+tr('admin.publish')+'</button><button class="btn btn-secondary" data-review-id="'+t.id+'" data-review-status="rejected">'+tr('admin.reject')+'</button></div></div>').join(''):'<p class="notice">'+tr('admin.noPending')+'</p>')+'<h2>'+tr('admin.reports')+'</h2>'+reportRows}
document.addEventListener('click',async event=>{const button=event.target.closest('[data-review-id]');if(!button)return;if(button.dataset.reviewStatus==='rejected'&&!(await askReviewConfirm()))return;button.disabled=true;button.dataset.busy='true';try{const r=await fetch('/api/admin/submissions/'+button.dataset.reviewId,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({status:button.dataset.reviewStatus})});if(!r.ok){const data=await r.json().catch(()=>({}));showToast(data.error||tr('admin.actionFailed'),'error');return}showToast(button.dataset.reviewStatus==='published'?tr('admin.published'):tr('admin.rejected'));refreshAdmin()}catch{showToast(tr('admin.actionFailed'),'error')}finally{button.disabled=false;button.dataset.busy='false'}});
bindAuthLinks();
refreshSession().then(s=>{if(s.user)refreshAdmin();else renderAdminSignIn()});
window.addEventListener('ugk:i18n',()=>refreshSession().then(s=>{if(s.user)refreshAdmin();else renderAdminSignIn()}));
</script>
</body>
</html>
