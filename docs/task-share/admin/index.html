<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin | UGK Tasks</title>
<style>
:root {
  --bg: #0a0a0f; --bg-elev: #14141c; --bg-elev2: #1c1c28;
  --border: #2a2a3a; --border-light: #3a3a4a;
  --text: #e4e4e7; --text-muted: #8b8b9a; --text-dim: #5a5a6a;
  --accent: #6366f1; --accent2: #8b5cf6;
  --accent-grad: linear-gradient(135deg, #6366f1, #8b5cf6);
  --success: #10b981; --danger: #ef4444;
  --radius: 16px; --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); }
body { min-height: 100vh; background: var(--bg); background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,102,241,0.12), transparent); color: var(--text); font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
.icon-sprite { position: absolute; width: 0; height: 0; overflow: hidden; }
.icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
.shell { max-width: 960px; margin: 0 auto; padding: 0 24px; }
.nav { position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); background: rgba(10,10,15,0.8); border-bottom: 1px solid var(--border); }
.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; gap: 24px; }
.brand { font-weight: 700; font-size: 18px; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.nav-links { display: flex; gap: 28px; font-size: 14px; font-weight: 500; color: var(--text-muted); }
.nav-links a:hover { color: var(--text); }
.nav-actions { display: flex; gap: 12px; align-items: center; }
.btn { height: 40px; padding: 0 20px; border: 0; border-radius: var(--radius-sm); display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; font-size: 14px; cursor: pointer; white-space: nowrap; transition: all var(--transition); font-family: inherit; }
.btn-primary { background: var(--accent-grad); color: #fff; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,0.4); }
.btn-secondary { background: var(--bg-elev); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--border-light); background: var(--bg-elev2); }
.chip { display: inline-flex; align-items: center; padding: 4px 10px; border: 1px solid var(--border); border-radius: 999px; color: var(--text-muted); font-size: 12px; }

.page-head { padding: 48px 0 32px; }
.kicker { color: var(--accent); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.page-head h1 { font-size: 40px; font-weight: 800; line-height: 1.1; margin: 12px 0 8px; letter-spacing: -0.02em; }
.page-head .lede { color: var(--text-muted); font-size: 16px; margin-bottom: 24px; }

.stack { display: flex; flex-direction: column; gap: 16px; }
.panel { padding: 32px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); min-height: 200px; }
.panel h2 { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
.panel h2 + h2, .panel h2:not(:first-child) { margin-top: 32px; }
.submission-row { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 12px; }
.submission-row strong { color: var(--text); display: block; font-size: 16px; margin-bottom: 4px; }
.submission-row p { color: var(--text-muted); font-size: 13px; margin-top: 6px; }
.submission-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.submission-actions .btn { height: 36px; padding: 0 16px; font-size: 13px; }
.notice { border-left: 3px solid var(--accent); padding: 8px 0 8px 14px; color: var(--text-muted); }

.footer { margin-top: 64px; padding: 32px 0; border-top: 1px solid var(--border); }
.footer p { color: var(--text-muted); font-size: 13px; }

@media (max-width: 600px) { .nav-links { display: none; } .page-head h1 { font-size: 32px; } .panel { padding: 20px; } }
</style>
</head>
<body>
<svg class="icon-sprite" aria-hidden="true"><symbol id="icon-download" viewBox="0 0 24 24"><path d="M12 3v12m0 0 5-5m-5 5-5-5M5 21h14"/></symbol><symbol id="icon-heart" viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"/></symbol><symbol id="icon-bookmark" viewBox="0 0 24 24"><path d="M6 3h12v18l-6-4-6 4V3Z"/></symbol><symbol id="icon-copy" viewBox="0 0 24 24"><path d="M8 8h11v13H8zM5 16H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h11a1 1 0 0 1 1 1v1"/></symbol><symbol id="icon-flag" viewBox="0 0 24 24"><path d="M5 21V4m0 0h12l-1.5 4L17 12H5"/></symbol></svg>

<nav class="nav"><div class="shell"><div class="nav-inner">
  <a class="brand" href="../">UGK TASKS</a>
  <div class="nav-links">
    <a href="../#catalog">Marketplace</a>
    <a href="../upload/">Upload</a>
    <a href="../account/">Account</a>
    <a href="../admin/">Admin</a>
  </div>
  <div class="nav-actions">
    <span class="chip" data-user>Guest</span>
    <a class="btn btn-primary" href="/api/auth/github">Sign in</a>
  </div>
</div></div></nav>

<div class="shell">
  <div class="page-head">
    <div class="kicker">Review queue</div>
    <h1>Admin</h1>
    <p class="lede">Review pending community submissions and reports.</p>
  </div>
  <section class="panel" data-admin-page><p class="notice">Loading review queue...</p></section>
</div>

<footer class="footer"><div class="shell"><p>Admin access is restricted by GitHub login.</p></div></footer>

<script>
function esc(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
async function refreshSession(){try{const r=await fetch('/api/session');const s=await r.json();document.querySelectorAll('[data-user]').forEach(n=>{n.textContent=s.user?('@'+s.user.login):'Guest'});document.body.dataset.signedIn=s.user?'true':'false';return s}catch{return{user:null}}}
async function refreshAdmin(){const root=document.querySelector('[data-admin-page]');if(!root)return;const [queue,reports]=await Promise.all([fetch('/api/admin/submissions'),fetch('/api/admin/reports')]);if(queue.status===401||reports.status===401){root.innerHTML='<p class="notice">Sign in with GitHub to review submissions.</p>';return}if(queue.status===403||reports.status===403){root.innerHTML='<p class="notice">This GitHub account is not an admin.</p>';return}if(!queue.ok||!reports.ok){root.innerHTML='<p class="notice">Review queue is unavailable.</p>';return}const data=await queue.json();const reportData=await reports.json();const items=data.submissions||[];const reportRows=(reportData.reports||[]).map(r=>'<div class="submission-row"><strong>'+esc(r.task_name)+'</strong><span>@'+esc(r.reporter_login||'user')+'</span><p>'+esc(r.reason)+'</p></div>').join('')||'<p class="notice">No open reports.</p>';root.innerHTML='<h2>Submissions</h2>'+(items.length?items.map(t=>'<div class="submission-row"><strong>'+esc(t.title)+'</strong><span>'+esc(t.name)+' by @'+esc(t.author_login||'user')+'</span><p>'+esc(t.description)+'</p><div class="submission-actions"><button class="btn btn-primary" data-review-id="'+t.id+'" data-review-status="published">Publish</button><button class="btn btn-secondary" data-review-id="'+t.id+'" data-review-status="rejected">Reject</button></div></div>').join(''):'<p class="notice">No pending submissions.</p>')+'<h2>Reports</h2>'+reportRows}
document.addEventListener('click',async event=>{const button=event.target.closest('[data-review-id]');if(!button)return;button.disabled=true;await fetch('/api/admin/submissions/'+button.dataset.reviewId,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({status:button.dataset.reviewStatus})});refreshAdmin()});
refreshSession();refreshAdmin();
</script>
</body>
</html>
