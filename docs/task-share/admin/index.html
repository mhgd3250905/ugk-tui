<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin | UGK Tasks</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body class="marketplace-page">
<svg class="icon-sprite" aria-hidden="true"><symbol id="icon-download" viewBox="0 0 24 24"><path d="M12 3v12m0 0 5-5m-5 5-5-5M5 21h14"/></symbol><symbol id="icon-heart" viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"/></symbol><symbol id="icon-bookmark" viewBox="0 0 24 24"><path d="M6 3h12v18l-6-4-6 4V3Z"/></symbol><symbol id="icon-copy" viewBox="0 0 24 24"><path d="M8 8h11v13H8zM5 16H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h11a1 1 0 0 1 1 1v1"/></symbol><symbol id="icon-flag" viewBox="0 0 24 24"><path d="M5 21V4m0 0h12l-1.5 4L17 12H5"/></symbol></svg>

<nav class="nav"><div class="shell"><div class="nav-inner">
  <a class="brand" href="../">UGK TASKS</a>
  <div class="nav-links">
    <a href="../#catalog">Marketplace</a>
    <a href="../upload/">Upload</a>
    <a href="../account/">Account</a>
    <a href="../admin/">Admin</a>
  </div>

    <span class="chip" data-user>Guest</span>
    <a class="btn btn-primary" href="/api/auth/github">Sign in</a>
  </div>
</div></div></nav>

<div class="shell shell-mid">
  <div class="page-head">
    <div class="kicker">Review queue</div>
    <h1>Admin</h1>
    <p class="lede">Review pending community submissions and reports.</p>
  </div>
  <section class="panel" data-admin-page><p class="notice">Loading review queue...</p></section>
</div>

<footer class="footer"><div class="shell"><div class="footer-inner">
  <span>产品 UGK</span>
  <span>作者 bboyUglyk</span>
  <a href="mailto:ug1yk@foxmail.com">联系方式 ug1yk@foxmail.com</a>
</div></div></footer>

<script>
function esc(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function showToast(message,type='info'){let box=document.querySelector('[data-toast]');if(!box){box=document.createElement('div');box.className='toast';box.dataset.toast='';box.setAttribute('role','status');box.setAttribute('aria-live','polite');document.body.appendChild(box)}box.textContent=message;box.dataset.type=type;box.dataset.show='true';clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>{box.dataset.show='false'},3200)}
function authErrorMessage(data){return data?.error==='GitHub OAuth is not configured'?'GitHub sign-in is not configured for this preview. Ask the owner to set GitHub OAuth credentials.':(data?.error||'GitHub sign-in could not start. Try again later.')}
async function startGithubAuth(){try{const r=await fetch('/api/auth/github',{redirect:'manual',headers:{accept:'application/json'}});if(r.type==='opaqueredirect'||(r.status>=300&&r.status<400)){location.href='/api/auth/github';return}const text=await r.text();let data;try{data=JSON.parse(text)}catch{data=null}if(!r.ok){showToast(authErrorMessage(data),'error');return}location.href='/api/auth/github'}catch{showToast('GitHub sign-in could not start. Try again later.','error')}}
function bindAuthLinks(){document.addEventListener('click',event=>{const link=event.target.closest('a[href="/api/auth/github"]');if(!link)return;event.preventDefault();startGithubAuth()})}
function askReviewConfirm(){return new Promise(resolve=>{let dialog=document.querySelector('[data-confirm-dialog]');if(!dialog){dialog=document.createElement('dialog');dialog.className='ugk-dialog';dialog.dataset.confirmDialog='';dialog.innerHTML='<form class="dialog-card"><h2>Reject submission?</h2><p>This marks the task submission as rejected. The author can submit a corrected package later.</p><div class="dialog-actions"><button class="btn btn-secondary" type="button" data-confirm-cancel>Cancel</button><button class="btn btn-primary" type="button" data-confirm-ok>Reject</button></div></form>';document.body.appendChild(dialog);dialog.querySelector('[data-confirm-cancel]').addEventListener('click',()=>dialog.close('cancel'));dialog.querySelector('[data-confirm-ok]').addEventListener('click',()=>dialog.close('ok'))}dialog.addEventListener('close',function onClose(){dialog.removeEventListener('close',onClose);resolve(dialog.returnValue==='ok')});dialog.showModal()})}
async function refreshSession(){try{const r=await fetch('/api/session');const s=await r.json();document.querySelectorAll('[data-user]').forEach(n=>{n.textContent=s.user?('@'+s.user.login):'Guest'});document.body.dataset.signedIn=s.user?'true':'false';return s}catch{return{user:null}}}
function renderAdminSignIn(){const root=document.querySelector('[data-admin-page]');if(!root)return;root.innerHTML='<div class="empty-state"><h2>Admin sign in required</h2><p>Use a GitHub account with admin access to review submissions and reports.</p><a class="btn btn-primary" href="/api/auth/github">Sign in with GitHub</a></div>'}
async function refreshAdmin(){const root=document.querySelector('[data-admin-page]');if(!root)return;const [queue,reports]=await Promise.all([fetch('/api/admin/submissions'),fetch('/api/admin/reports')]);if(queue.status===401||reports.status===401){renderAdminSignIn();return}if(queue.status===403||reports.status===403){root.innerHTML='<p class="notice">This GitHub account is not an admin.</p>';return}if(!queue.ok||!reports.ok){root.innerHTML='<p class="notice">Review queue is unavailable.</p>';return}const data=await queue.json();const reportData=await reports.json();const items=data.submissions||[];const reportRows=(reportData.reports||[]).map(r=>'<div class="submission-row"><strong>'+esc(r.task_name)+'</strong><span>@'+esc(r.reporter_login||'user')+'</span><p>'+esc(r.reason)+'</p></div>').join('')||'<p class="notice">No open reports.</p>';root.innerHTML='<h2>Submissions</h2>'+(items.length?items.map(t=>'<div class="submission-row"><strong>'+esc(t.title)+'</strong><span>'+esc(t.name)+' by @'+esc(t.author_login||'user')+'</span><p>'+esc(t.description)+'</p><div class="submission-actions"><button class="btn btn-primary" data-review-id="'+t.id+'" data-review-status="published">Publish</button><button class="btn btn-secondary" data-review-id="'+t.id+'" data-review-status="rejected">Reject</button></div></div>').join(''):'<p class="notice">No pending submissions.</p>')+'<h2>Reports</h2>'+reportRows}
document.addEventListener('click',async event=>{const button=event.target.closest('[data-review-id]');if(!button)return;if(button.dataset.reviewStatus==='rejected'&&!(await askReviewConfirm()))return;button.disabled=true;button.dataset.busy='true';try{const r=await fetch('/api/admin/submissions/'+button.dataset.reviewId,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({status:button.dataset.reviewStatus})});if(!r.ok){const data=await r.json().catch(()=>({}));showToast(data.error||'Review action failed.','error');return}showToast(button.dataset.reviewStatus==='published'?'Submission published.':'Submission rejected.');refreshAdmin()}catch{showToast('Review action failed.','error')}finally{button.disabled=false;button.dataset.busy='false'}});
bindAuthLinks();
refreshSession().then(s=>{if(s.user)refreshAdmin();else renderAdminSignIn()});
</script>
</body>
</html>
