<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Admin | UGK Tasks</title><style>
:root{color-scheme:dark;--yellow:#fcd535;--yellow2:#f0b90b;--canvas:#0b0e11;--card:#1e2329;--elev:#2b3139;--body:#eaecef;--muted:#707a8a;--muted2:#929aa5;--ink:#181a20;--up:#0ecb81;--down:#f6465d;--line:#2b3139;--light:#fafafa}
*{box-sizing:border-box}body{margin:0;background:var(--canvas);color:var(--body);font-family:BinanceNova,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow-x:hidden}a{color:inherit}.icon-sprite{position:absolute;width:0;height:0;overflow:hidden}.icon{width:18px;height:18px;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none}.shell{width:min(1280px,calc(100% - 32px));margin:0 auto}.nav{height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);gap:16px}.brand{color:var(--yellow);font-weight:700;letter-spacing:0}.nav-links{display:flex;gap:24px;color:var(--body);font-size:14px}.nav-actions{display:flex;gap:12px;align-items:center;flex-shrink:0}.btn{border:0;border-radius:6px;padding:12px 20px;font-weight:600;text-decoration:none;cursor:pointer;font-size:14px}.btn-primary{background:var(--yellow);color:var(--ink)}.btn-secondary{background:var(--card);color:#fff;border:1px solid var(--line)}.btn-text{background:transparent;color:var(--body);padding:8px 0}.icon-btn{width:44px;height:44px;padding:0;display:inline-flex;align-items:center;justify-content:center}.icon-btn[data-active="true"]{background:var(--yellow);border-color:var(--yellow);color:var(--ink)}.hero{display:grid;grid-template-columns:minmax(0,1fr)420px;gap:48px;padding:80px 0 48px}.kicker{color:var(--yellow);font-size:12px;font-weight:600;text-transform:uppercase}.hero h1{font-size:clamp(38px,6vw,64px);line-height:1.1;margin:12px 0 16px;letter-spacing:0}.lede{color:var(--muted2);font-size:16px;line-height:1.6;max-width:680px}.command-box,.panel,.task-card,.stat,.detail-hero{background:var(--card);border:1px solid var(--line);border-radius:8px}.command-box{padding:24px}.command-box code,.command{font-family:BinancePlex,"IBM Plex Mono",Consolas,monospace;color:var(--yellow);overflow-wrap:anywhere}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:16px 0 32px}.stat{padding:20px}.stat strong{display:block;color:var(--yellow);font-family:BinancePlex,monospace;font-size:32px}.stat span{color:var(--muted);font-size:13px}.toolbar{display:grid;grid-template-columns:1fr auto auto auto;gap:16px;margin:0 0 20px}.search{height:44px;background:var(--card);border:1px solid var(--line);border-radius:8px;color:#fff;padding:0 16px;min-width:0}.catalog{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.task-card{padding:20px;display:grid;gap:14px;min-width:0}.task-card h2{font-size:20px;margin:0;line-height:1.35}.desc{color:var(--muted2);line-height:1.5;min-height:64px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border:1px solid var(--line);border-radius:999px;color:var(--muted2);font-size:12px;padding:5px 9px}.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.metric{background:var(--elev);border-radius:8px;padding:10px;color:var(--muted);font-size:12px;min-width:0}.metric b{display:block;color:var(--yellow);font-family:BinancePlex,monospace;font-size:16px}.card-actions{display:grid;grid-template-columns:1fr repeat(5,44px);gap:8px}.card-actions .command{grid-column:1/-1;background:#11161c;border:1px dashed var(--line);border-radius:8px;padding:10px}.detail-hero{padding:32px;margin:32px 0}.detail-hero h1{font-size:48px;margin:8px 0 12px}.detail-grid{display:grid;grid-template-columns:minmax(0,1fr)360px;gap:24px}.panel{padding:24px}.panel h2{margin:0 0 14px;font-size:20px}.panel h3{margin:18px 0 10px;font-size:16px}.kv{display:grid;grid-template-columns:160px 1fr;gap:8px;padding:10px 0;border-bottom:1px solid var(--line)}.kv span:first-child{color:var(--muted)}.notice{border-left:3px solid var(--yellow);padding-left:12px;color:var(--muted2)}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.field{display:grid;gap:8px}.field-wide{grid-column:1/-1}.field label{color:var(--muted2);font-size:13px}.field input,.field textarea{width:100%;background:#11161c;border:1px solid var(--line);border-radius:8px;color:var(--body);font:inherit;padding:13px 14px}.field textarea{min-height:130px;resize:vertical}.field input[type=file]{padding:12px}.result{min-height:24px;color:var(--yellow);font-size:14px}.split{display:grid;grid-template-columns:1fr 1fr;gap:24px}.stack{display:grid;gap:12px}.submission-row{background:#11161c;border:1px solid var(--line);border-radius:8px;padding:14px;display:grid;gap:8px}.submission-row strong{color:var(--body)}.submission-actions{display:flex;gap:8px;flex-wrap:wrap}.community{margin:32px 0}.empty{color:var(--muted2);padding:18px 0}.footer{margin-top:80px;background:var(--light);color:var(--ink);padding:48px 0}.footer .shell{display:grid;grid-template-columns:1fr 1fr;gap:24px}.up{color:var(--up)}.down{color:var(--down)}@media(max-width:900px){.hero,.detail-grid,.split,.form-grid{grid-template-columns:1fr}.catalog{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.nav-links{display:none}.toolbar{grid-template-columns:1fr}.footer .shell{grid-template-columns:1fr}}@media(max-width:520px){.shell{width:calc(100% - 32px)}.nav [data-user]{display:none}.nav .btn-primary{padding:10px 14px}.hero{gap:32px;padding:72px 0 40px}.hero h1{font-size:36px}.card-actions{grid-template-columns:1fr repeat(3,44px)}.card-actions .icon-btn:nth-of-type(n+4){grid-row:2}.card-actions .command{font-size:13px}.metric-row{grid-template-columns:1fr}.stat{padding:18px}}</style></head><body><svg class="icon-sprite" aria-hidden="true"><symbol id="icon-download" viewBox="0 0 24 24"><path d="M12 3v12m0 0 5-5m-5 5-5-5M5 21h14"/></symbol><symbol id="icon-heart" viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"/></symbol><symbol id="icon-bookmark" viewBox="0 0 24 24"><path d="M6 3h12v18l-6-4-6 4V3Z"/></symbol><symbol id="icon-copy" viewBox="0 0 24 24"><path d="M8 8h11v13H8zM5 16H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h11a1 1 0 0 1 1 1v1"/></symbol><symbol id="icon-flag" viewBox="0 0 24 24"><path d="M5 21V4m0 0h12l-1.5 4L17 12H5"/></symbol></svg><div class="shell"><nav class="nav"><a class="brand" href="../">UGK TASKS</a><div class="nav-links"><a href="../#catalog">Marketplace</a><a href="../upload/">Upload</a><a href="../account/">Account</a><a href="../admin/">Admin</a><a href="../manifest.json">Manifest</a></div><div class="nav-actions"><span class="chip" data-user>Guest</span><a class="btn btn-primary" href="/api/auth/github">Sign in with GitHub</a></div></nav><section class="detail-hero"><div class="kicker">Review queue</div><h1>Admin</h1><p class="lede">Review pending community submissions.</p></section><section class="panel stack" data-admin-page><p class="notice">Loading review queue...</p></section></div><footer class="footer"><div class="shell"><div><strong>UGK Task Marketplace</strong><p>Admin access is restricted by GitHub login.</p></div><div><a class="btn btn-primary" href="../">Back to marketplace</a></div></div></footer><script>
function applyTaskData(name,data){for(const [key,value]of Object.entries(data)){document.querySelectorAll('[data-count="'+name+':'+key+'"]').forEach(n=>{n.textContent=value})}document.querySelectorAll('[data-action="like"][data-task="'+name+'"]').forEach(b=>{if('liked'in data){b.dataset.active=String(data.liked);b.setAttribute('aria-pressed',String(data.liked))}});document.querySelectorAll('[data-action="favorite"][data-task="'+name+'"]').forEach(b=>{if('favorited'in data){b.dataset.active=String(data.favorited);b.setAttribute('aria-pressed',String(data.favorited))}})}
function applyMarketplaceStats(data){for(const [key,value]of Object.entries(data)){document.querySelectorAll('[data-marketplace-stat="'+key+'"]').forEach(n=>{n.textContent=value})}}
function esc(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
async function refreshSession(){try{const r=await fetch('/api/session');const s=await r.json();document.querySelectorAll('[data-user]').forEach(n=>{n.textContent=s.user?('@'+s.user.login):'Guest'});document.body.dataset.signedIn=s.user?'true':'false';return s}catch{return{user:null}}}
async function refreshMarketplaceStats(){try{const r=await fetch('/api/stats');if(r.ok)applyMarketplaceStats(await r.json())}catch{}}
function filterTasks(){const q=(document.querySelector('[data-search]')?.value||'').toLowerCase();const category=document.querySelector('[data-category-filter]')?.value||'';const sort=document.querySelector('[data-sort]')?.value||'name';const catalog=document.querySelector('[data-catalog]');const cards=[...document.querySelectorAll('[data-task-card]')];cards.forEach(card=>{const matchesText=!q||card.dataset.search.includes(q);const matchesCategory=!category||card.dataset.category===category;card.hidden=!(matchesText&&matchesCategory)});cards.sort((a,b)=>{if(sort==='downloads'||sort==='likes')return Number(b.dataset[sort]||0)-Number(a.dataset[sort]||0);if(sort==='newest')return Number(b.dataset.newest||0)-Number(a.dataset.newest||0);return a.querySelector('h2').textContent.localeCompare(b.querySelector('h2').textContent)}).forEach(card=>catalog?.appendChild(card))}
async function refreshStats(){const names=[...new Set([...document.querySelectorAll('[data-count]')].map(n=>(n.dataset.count||'').split(':')[0]).filter(Boolean))];await Promise.all(names.map(async name=>{try{const r=await fetch('/api/tasks/'+encodeURIComponent(name)+'/stats');if(r.ok){const data=await r.json();applyTaskData(name,data);document.querySelectorAll('[data-task-card][data-task="'+name+'"]').forEach(card=>{for(const key of ['downloads','likes','favorites'])if(key in data)card.dataset[key]=data[key]})}}catch{}}));filterTasks()}
function rows(items,empty){return items.length?items.map(t=>'<div class="submission-row"><strong>'+esc(t.title||t.name)+'</strong><span class="chip">'+esc(t.status||t.name)+'</span><span>'+esc(t.description||'')+'</span></div>').join(''):'<p class="notice">'+empty+'</p>'}
async function refreshAccount(session){const root=document.querySelector('[data-account-page]');if(!root)return;if(!session.user){root.innerHTML='<p class="notice">Sign in with GitHub to view your account.</p>';return}const [fav,subs,downs]=await Promise.all([fetch('/api/account/favorites'),fetch('/api/account/submissions'),fetch('/api/account/downloads')]);if(!fav.ok||!subs.ok||!downs.ok){root.innerHTML='<p class="notice">Account data is unavailable.</p>';return}const f=await fav.json();const s=await subs.json();const d=await downs.json();root.innerHTML='<h2>@'+esc(session.user.login)+'</h2><div class="split"><div><h3>Favorites</h3>'+rows(f.favorites||[],'No favorites yet.')+'<h3>Downloads</h3>'+rows(d.downloads||[],'No downloads yet.')+'</div><div><h3>Submissions</h3>'+rows(s.submissions||[],'No submissions yet.')+'</div></div>'}
async function refreshCommunity(){const root=document.querySelector('[data-community-tasks]');if(!root)return;try{const r=await fetch('/api/community/tasks');if(!r.ok)return;const data=await r.json();const tasks=data.tasks||[];root.innerHTML=tasks.length?tasks.map(t=>'<article class="task-card"><div class="chips"><span class="chip">Community</span><span class="chip">@'+esc(t.author)+'</span></div><h2>'+esc(t.title)+'</h2><p class="desc">'+esc(t.description)+'</p><div class="metric-row"><span class="metric"><b>'+Number(t.downloads||0)+'</b>Downloads</span><span class="metric"><b>'+Number(t.likes||0)+'</b>Likes</span><span class="metric"><b>'+Number(t.favorites||0)+'</b>Saves</span></div><div class="card-actions"><a class="btn btn-primary" href="'+esc(t.downloadUrl||t.sourceUrl||'#')+'">Download</a></div></article>').join(''):'<p class="empty">Community submissions appear here after review.</p>'}catch{}}
async function refreshDetailMeta(){const root=document.querySelector('[data-detail-meta]');if(!root)return;const name=root.dataset.task;try{const [detail,versions]=await Promise.all([fetch('/api/tasks/'+encodeURIComponent(name)+'/stats-detail'),fetch('/api/tasks/'+encodeURIComponent(name)+'/versions')]);const d=detail.ok?await detail.json():{days:[]};const v=versions.ok?await versions.json():{versions:[]};root.innerHTML='<h2>Versions</h2>'+(v.versions.length?v.versions.map(item=>'<div class="kv"><span>'+esc(item.version)+'</span><span>'+esc(item.created_at||'published')+'</span></div>').join(''):'<p class="notice">Official version 1.0.0</p>')+'<h2>Download trend</h2>'+(d.days.length?d.days.map(day=>'<div class="kv"><span>'+esc(day.day)+'</span><span>'+Number(day.downloads||0)+' downloads</span></div>').join(''):'<p class="notice">No recent downloads.</p>')}catch{}}
async function submitUpload(form){const result=document.querySelector('[data-upload-result]');if(result)result.textContent='Submitting...';const r=await fetch('/api/tasks/submit',{method:'POST',body:new FormData(form)});if(r.status===401){location.href='/api/auth/github';return}const data=await r.json().catch(()=>({error:'submit_failed'}));if(result)result.textContent=r.ok?'Submitted for review: '+data.name:'Submit failed: '+(data.error||r.status);if(r.ok)form.reset()}
async function refreshAdmin(){const root=document.querySelector('[data-admin-page]');if(!root)return;const [queue,reports]=await Promise.all([fetch('/api/admin/submissions'),fetch('/api/admin/reports')]);if(queue.status===401||reports.status===401){root.innerHTML='<p class="notice">Sign in with GitHub to review submissions.</p>';return}if(queue.status===403||reports.status===403){root.innerHTML='<p class="notice">This GitHub account is not an admin.</p>';return}if(!queue.ok||!reports.ok){root.innerHTML='<p class="notice">Review queue is unavailable.</p>';return}const data=await queue.json();const reportData=await reports.json();const items=data.submissions||[];const reportRows=(reportData.reports||[]).map(r=>'<div class="submission-row"><strong>'+esc(r.task_name)+'</strong><span>@'+esc(r.reporter_login||'user')+'</span><p>'+esc(r.reason)+'</p></div>').join('')||'<p class="notice">No open reports.</p>';root.innerHTML='<h2>Submissions</h2>'+(items.length?items.map(t=>'<div class="submission-row"><strong>'+esc(t.title)+'</strong><span>'+esc(t.name)+' by @'+esc(t.author_login||'user')+'</span><p>'+esc(t.description)+'</p><div class="submission-actions"><button class="btn btn-primary" data-review-id="'+t.id+'" data-review-status="published">Publish</button><button class="btn btn-secondary" data-review-id="'+t.id+'" data-review-status="rejected">Reject</button></div></div>').join(''):'<p class="notice">No pending submissions.</p>')+'<h2>Reports</h2>'+reportRows}
async function postAction(button){const url=button.dataset.api;if(!url)return;const init={method:'POST'};if(button.dataset.action==='report'){const reason=prompt('Report reason');if(!reason)return;init.headers={'content-type':'application/json'};init.body=JSON.stringify({reason})}const r=await fetch(url,init);if(r.status===401){location.href='/api/auth/github';return}const data=await r.json();if(button.dataset.action==='report'){button.dataset.active='true';button.setAttribute('aria-pressed','true');return}applyTaskData(button.dataset.task,data)}
document.querySelectorAll('[data-copy]').forEach(button=>button.addEventListener('click',async()=>{await navigator.clipboard.writeText(button.dataset.copy);button.dataset.copied='true';button.title='Copied';setTimeout(()=>{button.dataset.copied='false';button.title=button.getAttribute('aria-label')||'Copy'},1200)}));
document.querySelectorAll('[data-action]').forEach(button=>button.addEventListener('click',()=>postAction(button)));
document.querySelectorAll('[data-upload-form]').forEach(form=>form.addEventListener('submit',event=>{event.preventDefault();submitUpload(form)}));
document.addEventListener('click',async event=>{const button=event.target.closest('[data-review-id]');if(!button)return;button.disabled=true;await fetch('/api/admin/submissions/'+button.dataset.reviewId,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({status:button.dataset.reviewStatus})});refreshAdmin()});
document.querySelectorAll('[data-download-api]').forEach(link=>link.addEventListener('click',()=>{fetch(link.dataset.downloadApi,{method:'POST',keepalive:true}).then(r=>r.ok?r.json():null).then(data=>{if(data)applyTaskData(link.dataset.task,data);refreshMarketplaceStats()}).catch(()=>{})}));
document.querySelectorAll('[data-search],[data-sort],[data-category-filter]').forEach(control=>control.addEventListener('input',filterTasks));
refreshSession().then(refreshAccount);refreshMarketplaceStats();refreshStats();refreshCommunity();refreshDetailMeta();refreshAdmin();</script></body></html>
