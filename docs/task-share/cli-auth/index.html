<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title data-i18n="title.cliAuth">CLI Authorization | UGK Tasks</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body class="marketplace-page">
<div class="shell shell-narrow">
  <div class="page-head">
    <div class="kicker" data-i18n="cli.kicker">CLI authorization</div>
    <h1 id="title" data-i18n="cli.initial.title">Authorizing UGK CLI</h1>
    <p id="message" class="lede" data-i18n="cli.initial.message">One moment while we connect to GitHub.</p>
  </div>

  <section class="panel">
    <p id="notice" class="notice" data-i18n="cli.initial.notice">Connecting to GitHub...</p>
    <div class="submission-actions" id="actions"></div>
  </section>
</div>

<footer class="footer"><div class="shell"><div class="footer-inner">
  <span><span data-i18n="footer.product">Product</span> UGK</span>
  <span><span data-i18n="footer.author">Author</span> bboyUglyk</span>
  <a href="mailto:ug1yk@foxmail.com"><span data-i18n="footer.contact">Contact</span> ug1yk@foxmail.com</a>
</div></div></footer>

<script src="../i18n.js"></script>
<script>
	// CLI publish auth handoff page. Three modes:
	//   ?c=<challenge>     — kicks off GitHub OAuth (server binds state<->challenge).
	//   ?cli=confirm&state= — after OAuth: asks the user to EXPLICITLY confirm they
	//                        want to authorize this device. Defends against phishing
	//                        (review H-REZ-1): a challenge injected into a victim's
	//                        OAuth can't auto-sign a token without this click.
	//   ?cli=done           — success; tells the user to go back to the terminal.
	(function () {
		var params = new URLSearchParams(location.search);
		var title = document.getElementById("title");
		var message = document.getElementById("message");
		var notice = document.getElementById("notice");
		var actions = document.getElementById("actions");
		var tr = function (key) { return window.UGKI18N?.t(key) || key; };
		var setCopy = function (titleKey, messageKey, noticeKey) {
			[title, message, notice].forEach(function (el) { el.removeAttribute("data-i18n"); });
			title.textContent = tr(titleKey);
			message.textContent = tr(messageKey);
			notice.textContent = tr(noticeKey);
		};

		if (params.get("cli") === "done") {
			setCopy("cli.done.title", "cli.done.message", "cli.done.notice");
			return;
		}

		if (params.get("cli") === "confirm") {
			// Explicit confirmation gate (CSRF defense). POSTing confirms; the
			// server signs the cli_token only on this authenticated click.
			var state = params.get("state");
			setCopy("cli.confirm.title", "cli.confirm.message", "cli.confirm.notice");
			var btn = document.createElement("button");
			btn.className = "btn btn-primary";
			btn.textContent = tr("cli.confirm.action");
			btn.onclick = function () {
				btn.disabled = true;
				btn.textContent = tr("cli.confirm.busy");
				fetch("/api/cli/auth/confirm", {
					method: "POST",
					headers: { "content-type": "application/json" },
					body: JSON.stringify({ state: state }),
				}).then(function (r) { return r.json().then(function (b) { return { ok: r.ok, body: b }; }); })
				.then(function (res) {
					if (res.ok) { window.location.href = "/cli-auth?cli=done"; }
					else { setCopy("cli.failure.title", "cli.failure.message", "cli.failure.notice"); notice.textContent = res.body.error || tr("cli.failure.notice"); btn.disabled = false; btn.textContent = tr("cli.confirm.action"); }
				})
				.catch(function () { setCopy("cli.network.title", "cli.network.message", "cli.failure.notice"); });
			};
			actions.appendChild(btn);
			return;
		}

		var challenge = params.get("c");
		if (!challenge || !/^[A-Za-z0-9_-]{16,128}$/.test(challenge)) {
			setCopy("cli.invalid.title", "cli.invalid.message", "cli.invalid.notice");
			return;
		}

		// Pure redirect: the server-side githubLogin binds state<->challenge.
		// No cookie is written here (P0 C2: challenge must not ride a JS-readable cookie).
		window.location.href = "/api/auth/github?cli_challenge=" + encodeURIComponent(challenge);
	})();
</script>
</body>
</html>
