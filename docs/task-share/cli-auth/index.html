<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CLI Authorization | UGK Tasks</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="shell">
  <section class="hero">
    <div class="hero-copy">
      <div class="kicker">UGK Task Marketplace</div>
      <h1 id="title">Authorizing UGK CLI…</h1>
      <p id="message" class="lede" style="max-width:680px;color:var(--text-muted);font-size:18px;line-height:1.7;">One moment while we connect to GitHub.</p>
      <div id="actions"></div>
    </div>
  </section>
</div>

<script>
	// CLI publish auth handoff page. Three modes:
	//   ?c=<challenge>     — kicks off GitHub OAuth (server binds state<->challenge).
	//   ?cli=confirm&state= — after OAuth: asks the user to EXPLICITLY confirm they
	//                        want to authorize this device. Defends against phishing
	//                        (review H-REZ-1): a challenge injected into a victim's
	//                        OAuth can't auto-sign a token without this click.
	//   ?cli=done           — success; tells the user to go back to the terminal.
	(function () {
		var params = new URLSearchParams(location.search);
		var title = document.getElementById("title");
		var message = document.getElementById("message");
		var actions = document.getElementById("actions");

		if (params.get("cli") === "done") {
			title.textContent = "✅ Authorization complete";
			message.textContent = "Return to your terminal — UGK will continue automatically.";
			return;
		}

		if (params.get("cli") === "confirm") {
			// Explicit confirmation gate (CSRF defense). POSTing confirms; the
			// server signs the cli_token only on this authenticated click.
			var state = params.get("state");
			title.textContent = "Authorize UGK CLI to publish on your behalf?";
			message.textContent = "Confirm to issue a token to this terminal. If you did NOT start /task publish, close this page.";
			var btn = document.createElement("button");
			btn.className = "btn btn-primary";
			btn.textContent = "Authorize";
			btn.onclick = function () {
				btn.disabled = true;
				btn.textContent = "Authorizing…";
				fetch("/api/cli/auth/confirm", {
					method: "POST",
					headers: { "content-type": "application/json" },
					body: JSON.stringify({ state: state }),
				}).then(function (r) { return r.json().then(function (b) { return { ok: r.ok, body: b }; }); })
				.then(function (res) {
					if (res.ok) { window.location.href = "/cli-auth?cli=done"; }
					else { title.textContent = "Authorization failed"; message.textContent = res.body.error || "Please re-run /task publish in your terminal."; btn.disabled = false; btn.textContent = "Authorize"; }
				})
				.catch(function () { title.textContent = "Network error"; message.textContent = "Please re-run /task publish in your terminal."; });
			};
			actions.appendChild(btn);
			return;
		}

		var challenge = params.get("c");
		if (!challenge || !/^[A-Za-z0-9_-]{16,128}$/.test(challenge)) {
			title.textContent = "Invalid authorization request";
			message.textContent = "The authorization link is malformed. Re-run /task publish in your terminal.";
			return;
		}

		// Pure redirect: the server-side githubLogin binds state<->challenge.
		// No cookie is written here (P0 C2: challenge must not ride a JS-readable cookie).
		window.location.href = "/api/auth/github?cli_challenge=" + encodeURIComponent(challenge);
	})();
</script>
</body>
</html>
