<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CLI Authorization | UGK Tasks</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="shell">
  <section class="hero">
    <div class="hero-copy">
      <div class="kicker">UGK Task Marketplace</div>
      <h1 id="title">Authorizing UGK CLI…</h1>
      <p id="message" class="lede">One moment while we connect to GitHub.</p>
    </div>
  </section>
</div>

<script>
	// CLI publish auth handoff page. Two modes:
	//   ?c=<challenge> — kicks off GitHub OAuth, passing the challenge to
	//                    /api/auth/github?cli_challenge=<c>. The server binds
	//                    state<->challenge (no JS-readable cookie); the callback
	//                    reverse-looks-up the challenge from the trusted state
	//                    and signs a cli_token the TUI polls for.
	//   ?cli=done       — shown after the callback; tells the user to go back.
	(function () {
		var params = new URLSearchParams(location.search);
		var title = document.getElementById("title");
		var message = document.getElementById("message");

		if (params.get("cli") === "done") {
			title.textContent = "✅ Authorization complete";
			message.textContent = "Return to your terminal — UGK will continue automatically.";
			return;
		}

		var challenge = params.get("c");
		if (!challenge || !/^[A-Za-z0-9_-]{16,128}$/.test(challenge)) {
			title.textContent = "Invalid authorization request";
			message.textContent = "The authorization link is malformed. Re-run /task publish in your terminal.";
			return;
		}

		// Pure redirect: the server-side githubLogin binds state<->challenge.
		// No cookie is written here (P0 C2: challenge must not ride a JS-readable cookie).
		window.location.href = "/api/auth/github?cli_challenge=" + encodeURIComponent(challenge);
	})();
</script>
</body>
</html>
