<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Submit a UGK taskbook zip for marketplace review.">
<title data-i18n="title.upload">Upload Task | UGK Tasks</title>
<link rel="icon" href="/favicon.ico">
<script>try{document.documentElement.dataset.theme=localStorage.getItem('ugk.taskShare.theme')==='light'?'light':'dark'}catch{document.documentElement.dataset.theme='dark'}</script>
<link rel="stylesheet" href="../styles.css">
</head>
<body class="marketplace-page">
<svg class="icon-sprite" aria-hidden="true"><symbol id="icon-download" viewBox="0 0 24 24"><path d="M12 3v12m0 0 5-5m-5 5-5-5M5 21h14"/></symbol><symbol id="icon-heart" viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"/></symbol><symbol id="icon-bookmark" viewBox="0 0 24 24"><path d="M6 3h12v18l-6-4-6 4V3Z"/></symbol><symbol id="icon-copy" viewBox="0 0 24 24"><path d="M8 8h11v13H8zM5 16H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h11a1 1 0 0 1 1 1v1"/></symbol><symbol id="icon-flag" viewBox="0 0 24 24"><path d="M5 21V4m0 0h12l-1.5 4L17 12H5"/></symbol></svg>

<nav class="nav"><div class="shell"><div class="nav-inner">
  <a class="nav-mobile-brand" href="../" aria-label="UGK Task Marketplace"><span>UGK</span><em>Task</em></a>
  <button class="nav-menu-toggle" type="button" data-nav-toggle aria-expanded="false" data-i18n-aria-label="nav.menu" aria-label="Menu"><span></span><span></span><span></span></button>
  <div class="nav-links">
    <a href="../marketplace/" data-i18n="nav.marketplace">Marketplace</a>
    <a href="../upload/" data-i18n="nav.upload">Upload</a>
    <a href="../account/" data-i18n="nav.account">Account</a>
    <a href="../admin/" data-i18n="nav.admin">Admin</a>
    <div class="nav-menu-actions">
      <span data-theme-switcher></span>
      <span data-language-switcher></span>
      <a class="btn btn-primary" href="/api/auth/github" data-auth-link data-i18n="nav.signIn">Sign in</a>
    </div>
  </div>
  <div class="nav-actions">
    <span class="chip" data-user>Guest</span>
    <span data-theme-switcher></span>
    <span data-language-switcher></span>
    <a class="btn btn-primary" href="/api/auth/github" data-auth-link data-i18n="nav.signIn">Sign in</a>
  </div>
</div></div></nav>

<main class="shell shell-narrow">
  <div class="page-head">
    <h1 data-i18n="upload.title">Upload a task</h1>
    <p class="lede" data-i18n="upload.lede">Submit a taskbook zip for review.</p>
  </div>

  <section class="panel">
    <form class="form-grid" data-upload-form>
      <div class="field">
        <label for="task-name" data-i18n="upload.name">Task name</label>
        <input id="task-name" name="name" required autocomplete="off" pattern="[A-Za-z0-9][A-Za-z0-9_-]{1,63}" data-i18n-placeholder="upload.namePlaceholder" placeholder="my-task">
      </div>
      <div class="field">
        <label for="task-version" data-i18n="upload.version">Version (semver)</label>
        <input id="task-version" name="version" required autocomplete="off" pattern="[0-9]+\.[0-9]+\.[0-9]+" placeholder="1.0.0" value="1.0.0">
      </div>
      <div class="field">
        <label for="task-title" data-i18n="upload.taskTitle">Title</label>
        <input id="task-title" name="title" required autocomplete="off" data-i18n-placeholder="upload.titlePlaceholder" placeholder="My Task">
      </div>
      <div class="field field-wide">
        <label for="task-description" data-i18n="upload.description">Description</label>
        <textarea id="task-description" name="description" required data-i18n-placeholder="upload.descPlaceholder" placeholder="What this task does"></textarea>
      </div>
      <div class="required-files">
        <strong data-i18n="upload.requiredFiles">Your zip must contain these 5 files:</strong>
        <ul><li>taskbook.json</li><li>spec.json</li><li>skill.md</li><li>verify.mjs</li><li>contract.json</li></ul>
      </div>
      <div class="field field-wide file-field">
        <label for="task-artifact" data-i18n="upload.zip">Taskbook zip</label>
        <label class="file-drop" for="task-artifact">
          <span><strong data-file-name>No zip selected</strong><span data-i18n="upload.chooseArchive">Choose the packaged taskbook archive.</span></span>
          <span class="btn btn-secondary" data-i18n="upload.chooseZip">Choose zip</span>
        </label>
        <input id="task-artifact" name="artifact" type="file" accept=".zip,application/zip" required>
      </div>
      <div class="submit-row">
        <button class="btn btn-primary" type="submit" data-i18n="upload.submit">Submit for review</button>
        <span class="result" data-upload-result aria-live="polite"></span>
      </div>
    </form>
  </section>
</main>

<footer class="footer"><div class="shell"><div class="footer-inner">
  <span><span data-i18n="footer.product">Product</span> UGK</span>
  <span><span data-i18n="footer.author">Author</span> bboyUglyk</span>
  <a href="mailto:ug1yk@foxmail.com"><span data-i18n="footer.contact">Contact</span> ug1yk@foxmail.com</a>
</div></div></footer>

<script src="../i18n.js"></script>
<script>
function tr(key,vars){return window.UGKI18N?.t(key,vars)||key}
function esc(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function showToast(message,type='info'){let box=document.querySelector('[data-toast]');if(!box){box=document.createElement('div');box.className='toast';box.dataset.toast='';box.setAttribute('role','status');box.setAttribute('aria-live','polite');document.body.appendChild(box)}box.textContent=message;box.dataset.type=type;box.dataset.show='true';clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>{box.dataset.show='false'},3200)}
function authErrorMessage(data){return data?.error==='GitHub OAuth is not configured'?tr('toast.authMissing'):(data?.error||tr('toast.authFailed'))}
async function startGithubAuth(){try{const r=await fetch('/api/auth/github',{redirect:'manual',headers:{accept:'application/json'}});if(r.type==='opaqueredirect'||(r.status>=300&&r.status<400)){location.href='/api/auth/github';return}const text=await r.text();let data;try{data=JSON.parse(text)}catch{data=null}if(!r.ok){showToast(authErrorMessage(data),'error');return}location.href='/api/auth/github'}catch{showToast(tr('toast.authFailed'),'error')}}
function bindAuthLinks(){document.addEventListener('click',event=>{const link=event.target.closest('a[href="/api/auth/github"]');if(!link)return;event.preventDefault();startGithubAuth()})}
async function refreshSession(){try{const r=await fetch('/api/session');const s=await r.json();document.querySelectorAll('[data-user]').forEach(n=>{n.textContent=s.user?('@'+s.user.login):tr('nav.guest')});document.body.dataset.signedIn=s.user?'true':'false';return s}catch{document.querySelectorAll('[data-user]').forEach(n=>{n.textContent=tr('nav.guest')});return{user:null}}}
function bindFileName(){const input=document.querySelector('#task-artifact');const label=document.querySelector('[data-file-name]');if(!input||!label)return;const update=()=>{label.textContent=input.files?.[0]?.name||tr('upload.noZip')};input.addEventListener('change',update);window.addEventListener('ugk:i18n',()=>{if(!input.files?.length)update()});update()}
function applyUploadAuth(session){const form=document.querySelector('[data-upload-form]');const result=document.querySelector('[data-upload-result]');if(!form)return;if(session.user){delete form.dataset.locked;form.querySelectorAll('input, textarea, button[type="submit"]').forEach(control=>{control.disabled=false});return}form.dataset.locked='auth';form.querySelectorAll('input, textarea, button[type="submit"]').forEach(control=>{control.disabled=true});if(result)result.innerHTML=tr('upload.signInFirst')+' <a href="/api/auth/github">'+tr('nav.signIn')+'</a>'}
async function submitUpload(form){const result=document.querySelector('[data-upload-result]');const submit=form.querySelector('button[type="submit"]');if(result)result.textContent=tr('upload.submitting');if(submit)submit.disabled=true;try{const r=await fetch('/api/tasks/submit',{method:'POST',body:new FormData(form)});if(r.status===401){startGithubAuth();return}const text=await r.text();let data;try{data=JSON.parse(text)}catch{data=null}if(result)result.textContent=r.ok?tr('upload.submitSuccess',{name:data?.name||'',version:data?.version?' v'+data.version:''}):tr('upload.submitFailed',{error:(data?.error||'HTTP '+r.status)+' '+(data?.detail||text.slice(0,300))});if(r.ok){form.reset();const label=document.querySelector('[data-file-name]');if(label)label.textContent=tr('upload.noZip')}}catch(e){if(result)result.textContent=tr('upload.networkError',{message:e.message})}finally{if(submit)submit.disabled=false}}
document.querySelectorAll('[data-upload-form]').forEach(form=>form.addEventListener('submit',event=>{event.preventDefault();submitUpload(form)}));
bindFileName();
bindAuthLinks();
refreshSession().then(applyUploadAuth);
window.addEventListener('ugk:i18n',()=>refreshSession().then(applyUploadAuth));
</script>
</body>
</html>
